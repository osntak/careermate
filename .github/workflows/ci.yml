name: CI

# main으로의 push와 모든 PR에서 타입체크·테스트·UI 스모크를 실행해 회귀를 막습니다.
# (배포는 별도 release.yml이 버전 태그에서만 처리합니다.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 브랜치/PR에서 새 커밋이 오면 진행 중 실행을 취소해 자원을 아낍니다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (코어 + API + 보안 + MCP + DB 불변식)
        run: npm test

      # UI 스모크는 Chromium이 필요합니다(없으면 ui-smoke가 스스로 건너뛰므로,
      # CI에서는 명시적으로 설치해 실제로 렌더·반응형 오버플로를 검사합니다).
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: UI smoke (렌더 + 반응형 오버플로)
        run: npm run test:ui
